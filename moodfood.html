<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Food 🍔</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080F;
    --bg2: #10101A;
    --coral: #FF4D6D;
    --purple: #9B5DE5;
    --lime: #CCFF33;
    --orange: #FF8C42;
    --pink: #FF6BBA;
    --cyan: #00F5D4;
    --yellow: #FFE066;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.1);
    --text: #F5F5F5;
    --muted: rgba(245,245,245,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── AMBIENT BLOBS ── */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(100px);
    opacity: 0.18; pointer-events: none; z-index: 0;
  }
  .blob1 { width: 500px; height: 500px; background: var(--purple); top: -200px; right: -150px; }
  .blob2 { width: 400px; height: 400px; background: var(--coral); bottom: -150px; left: -100px; }
  .blob3 { width: 300px; height: 300px; background: var(--lime); top: 40%; left: 40%; opacity: 0.08; }

  /* ══════════════════ PAGE 1 ══════════════════ */
  #page1 {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px; position: relative; z-index: 1;
  }

  .logo-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }

  .logo-emoji {
    font-size: 2.4rem;
    animation: wiggle 3s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--coral), var(--purple), var(--lime));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -1px;
  }

  .subtitle {
    color: var(--muted); font-size: 1.05rem; margin-bottom: 48px;
    font-weight: 300; letter-spacing: 0.02em;
  }

  .time-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px); border-radius: 100px;
    padding: 6px 16px; font-size: 0.8rem; color: var(--muted);
    margin-bottom: 40px; letter-spacing: 0.05em;
  }

  .time-badge span { color: var(--lime); font-weight: 600; }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px; max-width: 560px; width: 100%;
  }

  .mood-btn {
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(16px);
    border-radius: 20px; padding: 22px 12px;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative; overflow: hidden;
  }

  .mood-btn::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent-color, transparent);
    opacity: 0; transition: opacity 0.25s;
    border-radius: inherit;
  }

  .mood-btn:hover::before { opacity: 0.15; }
  .mood-btn:hover {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--accent-color, var(--glass-border));
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-color, transparent);
  }

  .mood-btn:active { transform: scale(0.97); }

  .mood-emoji { font-size: 2rem; position: relative; z-index: 1; }

  .mood-label {
    font-family: 'Syne', sans-serif; font-size: 0.78rem;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text); position: relative; z-index: 1;
  }

  /* Individual mood colours */
  .m-happy { --accent-color: #FFE066; }
  .m-sad { --accent-color: #4FC3F7; }
  .m-stressed { --accent-color: #FF4D6D; }
  .m-annoyed { --accent-color: #FF8C42; }
  .m-fear { --accent-color: #B39DDB; }
  .m-depressed { --accent-color: #9B5DE5; }
  .m-surprised { --accent-color: #00F5D4; }
  .m-lonely { --accent-color: #FF6BBA; }
  .m-idk { --accent-color: #CCFF33; }

  /* ── LOADER ── */
  #loader {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: var(--bg); align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #loader.active { display: flex; }

  .loader-emoji { font-size: 4rem; animation: spin-bounce 0.6s ease-in-out infinite alternate; }
  @keyframes spin-bounce {
    from { transform: translateY(0) rotate(-10deg); }
    to { transform: translateY(-20px) rotate(10deg); }
  }
  .loader-text {
    font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700;
    color: var(--muted);
  }
  .loader-bar {
    width: 200px; height: 3px; background: var(--glass);
    border-radius: 10px; overflow: hidden;
  }
  .loader-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--coral), var(--purple));
    animation: loadfill 1.4s ease forwards;
    border-radius: 10px;
  }
  @keyframes loadfill { to { width: 100%; } }

  /* ══════════════════ PAGE 2 ══════════════════ */
  #page2 {
    display: none; min-height: 100vh; padding: 40px 24px 60px;
    position: relative; z-index: 1;
  }
  #page2.active { display: block; }

  .p2-header {
    max-width: 900px; margin: 0 auto 40px;
    display: flex; flex-wrap: wrap; align-items: center;
    justify-content: space-between; gap: 16px;
  }

  .back-btn {
    background: var(--glass); border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(12px); border-radius: 100px;
    padding: 10px 20px; font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700; color: var(--text);
    cursor: pointer; letter-spacing: 0.05em;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-2px); }

  .p2-meta {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .p2-mood-tag {
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
    padding: 8px 18px; border-radius: 100px;
    background: linear-gradient(135deg, var(--coral), var(--purple));
    letter-spacing: 0.02em;
  }

  .p2-time-tag {
    font-size: 0.82rem; color: var(--muted); letter-spacing: 0.05em;
  }

  .shuffle-btn {
    background: var(--lime); color: #000; border: none;
    border-radius: 100px; padding: 10px 22px;
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 800;
    cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .shuffle-btn:hover { background: #d4ff00; transform: scale(1.04); box-shadow: 0 0 24px rgba(204,255,51,0.4); }

  .vibe-line {
    max-width: 900px; margin: 0 auto 36px;
    font-family: 'Syne', sans-serif; font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    font-weight: 800; line-height: 1.2;
  }

  .vibe-line em { font-style: normal; color: var(--lime); }

  /* ── FOOD CARDS ── */
  .food-grid {
    max-width: 900px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  .food-card {
    background: var(--glass); border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(20px); border-radius: 24px;
    overflow: hidden; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .food-card:hover { transform: translateY(-6px); }

  .card-top {
    height: 130px; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; position: relative;
  }

  .card-body { padding: 18px 20px 20px; }

  .food-name {
    font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
    margin-bottom: 6px;
  }

  .food-desc {
    font-size: 0.82rem; color: var(--muted); margin-bottom: 16px;
    line-height: 1.5; font-weight: 300;
  }

  .order-label {
    font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 8px; font-weight: 600;
  }

  .delivery-links {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .dl-link {
    text-decoration: none; border-radius: 100px;
    padding: 5px 12px; font-size: 0.72rem; font-weight: 700;
    font-family: 'Syne', sans-serif; letter-spacing: 0.04em;
    transition: all 0.2s; white-space: nowrap;
    border: 1.5px solid;
  }

  .dl-swiggy { color: #FC8019; border-color: #FC8019; }
  .dl-swiggy:hover { background: #FC8019; color: #000; }
  .dl-zomato { color: #E23744; border-color: #E23744; }
  .dl-zomato:hover { background: #E23744; color: #fff; }
  .dl-zepto { color: #8025FB; border-color: #8025FB; }
  .dl-zepto:hover { background: #8025FB; color: #fff; }
  .dl-toing { color: var(--cyan); border-color: var(--cyan); }
  .dl-toing:hover { background: var(--cyan); color: #000; }
  .dl-ownly { color: var(--pink); border-color: var(--pink); }
  .dl-ownly:hover { background: var(--pink); color: #000; }
  .dl-bistro { color: var(--lime); border-color: var(--lime); }
  .dl-bistro:hover { background: var(--lime); color: #000; }

  /* shuffle flip */
  .food-grid.flipping .food-card {
    animation: flipOut 0.2s ease forwards;
  }
  @keyframes flipOut {
    to { opacity: 0; transform: scale(0.85) translateY(-10px); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .mood-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mood-btn { padding: 16px 8px; border-radius: 16px; }
    .mood-emoji { font-size: 1.6rem; }
    .mood-label { font-size: 0.68rem; }
    .food-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

function getTimeslot() {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return 'Morning';
  if (h >= 12 && h < 17) return 'Afternoon';
  if (h >= 17 && h < 21) return 'Evening';
  return 'Night';
}

function getTimeslotEmoji(slot) {
  return { Morning:'🌅', Afternoon:'☀️', Evening:'🌆', Night:'🌙' }[slot];
}

let currentMood = '', currentEmoji = '', currentAccent = '';
const shown = {}; // tracks shown indices per mood+slot key

function selectMood(mood, emoji, accent) {
  currentMood = mood;
  currentEmoji = emoji;
  currentAccent = accent;
  showLoader(mood, emoji);
}

function showLoader(mood, emoji) {
  const loader = document.getElementById('loader');
  loader.classList.add('active');
  document.getElementById('loaderEmoji').textContent = emoji;

  const msgs = [
    'Reading your vibes...',
    'Consulting the food oracle...',
    'Sniffing out the perfect meal...',
    'Almost there 🍽️',
  ];
  let i = 0;
  const lt = document.getElementById('loaderText');
  lt.textContent = msgs[0];
  const interval = setInterval(() => { i++; if (msgs[i]) lt.textContent = msgs[i]; }, 350);

  // Reset fill animation
  const fill = document.getElementById('loadFill');
  fill.style.animation = 'none';
  fill.getBoundingClientRect();
  fill.style.animation = '';

  setTimeout(() => {
    clearInterval(interval);
    loader.classList.remove('active');
    showPage2();
  }, 1500);
}

function showPage2() {
  const slot = getTimeslot();
  document.body.style.background = BG_GRADIENTS[slot];

  document.getElementById('page1').style.display = 'none';
  const p2 = document.getElementById('page2');
  p2.classList.add('active');

  document.getElementById('moodTag').style.background = `linear-gradient(135deg, ${currentAccent}99, ${currentAccent}33)`;
  document.getElementById('moodTag').textContent = `${currentEmoji} ${currentMood}`;
  document.getElementById('timeTag').textContent = `• ${getTimeslotEmoji(slot)} ${slot}`;

  const lines = VIBE_LINES[currentMood];
  document.getElementById('vibeLine').innerHTML = lines[Math.floor(Math.random() * lines.length)].replace(/(.+?)(\s[^\s]+)$/, '<em>$1</em>$2');

  renderCards(slot);
}

function renderCards(slot) {
  const key = `${currentMood}_${slot}`;
  if (!shown[key]) shown[key] = [];

  const pool = FOODS[currentMood][slot];
  let available = pool.filter((_, i) => !shown[key].includes(i));
  if (available.length < 5) {
    shown[key] = [];
    available = pool;
  }

  const shuffled = [...available].sort(() => Math.random() - 0.5).slice(0, 5);
  shuffled.forEach(item => {
    const idx = pool.indexOf(item);
    if (!shown[key].includes(idx)) shown[key].push(idx);
  });

  const grid = document.getElementById('foodGrid');
  grid.innerHTML = '';

  shuffled.forEach((food, i) => {
    const card = document.createElement('div');
    card.className = 'food-card';
    card.style.animationDelay = `${i * 0.08}s`;

    const hue = (i * 60 + Math.random() * 30) % 360;
    card.innerHTML = `
      <div class="card-top" style="background: hsl(${hue},40%,8%);">
        ${food.e}
      </div>
      <div class="card-body">
        <div class="food-name">${food.n}</div>
        <div class="food-desc">${food.d}</div>
        <div class="order-label">Order on →</div>
        <div class="delivery-links">
          ${DELIVERY_LINKS.map(d => `<a href="${d.url}" target="_blank" class="dl-link ${d.cls}">${d.label}</a>`).join('')}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function shuffleCards() {
  const grid = document.getElementById('foodGrid');
  grid.classList.add('flipping');
  setTimeout(() => {
    grid.classList.remove('flipping');
    renderCards(getTimeslot());
  }, 200);
}

function goBack() {
  document.body.style.background = '';
  document.getElementById('page2').classList.remove('active');
  document.getElementById('page1').style.display = 'flex';
}

// Init time badge
(function () {
  const slot = getTimeslot();
  const t = new Date();
  const h = t.getHours() % 12 || 12;
  const m = String(t.getMinutes()).padStart(2, '0');
  const ampm = t.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('timeslot-badge').textContent = `${h}:${m} ${ampm} — ${slot}`;
})();
</script>
</body>
</html>
